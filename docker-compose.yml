version: '3.8'

services:
  # Запуск: docker-compose --profile prod up -d
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: 1xmobcash_web_prod
    restart: always
    profiles: ["prod"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  # Запуск: docker-compose --profile dev up
  web-dev:
    image: node:20-alpine
    container_name: 1xmobcash_web_dev
    working_dir: /app
    profiles: ["dev"]
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next # Чтобы сборка dev не мешала локальной
    ports:
      - "3000:3000"
    command: npm run dev
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true # Помогает Hot Reload в некоторых сетевых средах