services:
  # Запуск: docker compose --profile prod up -d
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: 1xmobcash_web_prod
    restart: always
    profiles: ["prod"]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

  # Запуск: docker compose --profile dev up -d
  web-dev:
    image: node:20-alpine
    container_name: 1xmobcash_web_dev
    working_dir: /app
    profiles: ["dev"]
    volumes:
      - .:/app
      - /app/node_modules # Изолируем зависимости (остается пустым, поэтому нужен npm install в command)
      - /app/.next
    ports:
      - "3000:3000"
    # Сначала ставим пакеты (если их нет), затем запускаем dev-сервер
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0"
      PORT: 3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true" # Заставляет файловый наблюдатель работать на Windows
      WDS_SOCKET_PORT: 0